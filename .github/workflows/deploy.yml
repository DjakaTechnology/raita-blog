name: Deploy Blog & Wiki

on:
  push:
    branches: [main]

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

jobs:
  deploy-blog:
    name: Deploy Blog
    runs-on: ubuntu-latest
    env:
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_BLOG_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Pull Vercel config
        run: npx vercel pull --yes --environment=production --token=$VERCEL_TOKEN

      - name: Build blog
        run: npm run build:blog

      - name: Copy output for Vercel
        run: |
          mkdir -p .vercel/output/static
          cp -r out/* .vercel/output/static/
          echo '{"version":3}' > .vercel/output/config.json

      - name: Deploy to Vercel
        run: npx vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN

  deploy-wiki:
    name: Deploy Wiki
    runs-on: ubuntu-latest
    env:
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_WIKI_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Pull Vercel config
        run: npx vercel pull --yes --environment=production --token=$VERCEL_TOKEN

      - name: Build wiki
        run: npm run build:wiki

      - name: Copy output for Vercel
        run: |
          mkdir -p .vercel/output/static
          cp -r out/* .vercel/output/static/
          echo '{"version":3}' > .vercel/output/config.json

      - name: Deploy to Vercel
        run: npx vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
